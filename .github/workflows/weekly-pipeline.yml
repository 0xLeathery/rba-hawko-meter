name: Weekly Data Pipeline

on:
  schedule:
    - cron: '7 2 * * 1'       # Monday 2:07 AM UTC (off-peak, avoids :00)
  workflow_dispatch:            # Manual trigger support

permissions:
  contents: write              # Required for git-auto-commit-action

concurrency:
  group: weekly-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m pipeline.main

      - name: Generate pipeline status summary
        if: always()
        run: |
          echo "## Weekly Pipeline Status" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, os
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          try:
              with open('public/data/status.json') as f:
                  status = json.load(f)
              score = status['overall']['hawk_score']
              available = status['metadata']['indicators_available']
              missing = status['metadata']['indicators_missing']
              zone = status['overall']['zone_label']
              with open(summary_file, 'a') as out:
                  out.write(f'Hawk Score: **{score:.1f}** ({zone})\n')
                  out.write(f'Indicators: {available}/8 available\n')
                  if missing:
                      out.write('Missing: ' + ', '.join(missing) + '\n')
          except Exception as e:
              with open(summary_file, 'a') as out:
                  out.write(f'Error reading status.json: {e}\n')
          "

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: weekly pipeline update [skip ci]'
          file_pattern: 'data/*.csv public/data/status.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
